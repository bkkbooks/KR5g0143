front:
  text: 洞真太上神虎隱文太上大道君爰乃自彈景龍雲璈霄音千逸萬響纒激流徽欎勃紫藹回隂玄風八發於是玉鳳延頸金鸞整氣龍吟碧波虎躍瓊州九嘯和唱玄鈞洞天伏獸攘袂猛馬張喉猲嶽橫𣏣銜劔攝邪衆聲紛亂百玃妖爾乃命玉清上宫侍女安法嬰田四非趙定珠李雲門合歌揮神之詩滅精散靈之曲其辭曰
  hash: sha256:94b09b0b71feb55b0313672f7d4c89cf54d1b1b823247795b025779ea427e362
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0143_HFL_000-001a, image: hfl/1031/1031-014.png}
body:
  text: 昔泛太霞轡八浮造雲營神宗理靈襟龍翰秀玉京金門纒蔚𥙿九房朗紫瓊髙駕涉北元蕭蕭入無生朱虎導靈師緑轅登上清四玄明朝禁抱華還鳳城七難尚梵緑擬標九元衢宣曜寶太暉飈眇躍景敷整控啓素鄉河靈已前驅隂雲帶夜日燭月歘交𥘉結朗朱生神攜領同反無萬源寫北谷乘空歸流星滅景擢浮遊峩峯自霄浪纒綿嘉樂宿妙微挺虛向逸宅丹玄珠太空道亦暢幽明秉靈符暗推豈乖喪落玄表群會生始似久夢德隱沖內迹至寂不覺當神精感太素煙映在所之玄響奏象外幽條焉能疑協晨鼓長扇暉霞生在兹絶洞溟溟流翔翅六領臺神王入玉虛至無侵朱兵九羅遘幽遼妙會亦巳平道藏金極章彈調赫柏榮千龍吐緑水九河倒竭傾洪藹攝絶宅靈浪四蓋庭齊首崚嶒宇莫檢形與名領拔納和秀縱玄執化理含精灼雲房蕭伻清零紀靈道趣蘭闕玄玄那排起萬峰坦竒觀雲上有瓊子終劫協玉華靡覺方日始原神齊洞化淪伏忘定征河侯結上觀景珠瑋琳庭理元三靈表凝澄豈虧盈太陽交重隂回拂存落冥全任六覺外靈唱齊一聲運機璿漢道煥煥動華瓊萬神騰朱馬千魔無暇生妖滅水火官真躬保太貞四命北阿理神定轡呼召地祇土精匿氣山嶽藏雲九源絶滅推校千精執馘雷震北帝啓道四明奉轅摧爛萬邪勒割酆山九鬼共首千魔同身五帝秉鉞神公吐煙紫朗竦觀朱氣纍纒靈走夜臺精藏長綿毒獸萬尺所屠無親有何小妖聚百纍千交氣齊瞻當人生門神虎縱威斬攫梟殘太元竒道至靈所甄子今受之永以佩身萬試不校千妖不干玉華詣房天真遊旋諷明靈音上朝三元歌畢於是太上大道君乃命左玄玉郎鬱利玄執金羽節召太微天帝君太微天帝君凝化精氣操真榮虛嘯吒萬神擁羅本初手執金真淡盻太旡忽聞命卒行登勑駕羽靈朱皇啓道輦甲天丁萬虎驅除金龍御兵玉節投景飛華入冥流燭煥陳行啓日精打碧鼓之旁浪扣瓊鍾之砰砰於是玄鈞合和廣樂遏後九鳳延頸而嘯嘯百龍銜律而同詬金精踊音八鸞翔儛紫旗建霄錦旄繞野緑蓋列廕曲晨歘舉流鈴交擲月明徹響瓊竿表真回渟五象香花散煙芬葩三景輕霄納暉薄霞帶光鳴轡七道八輿浮空虛輦九千衛以毒龍走雲赴玄聚氣攝風天明蓊潰八光蒙籠真女右騎左命靈童倏歘千億巳到上宫停駕玉清身起帝墉回步紫闕稽首待通既至良久太上大道君勑命侍晨四臣徐引以前登蘂珠之闥入七映內房太微天帝君稱名曰賤臣今到請開大命矣太上大道君曰李山淵德合七聖為金闕之主方當參謁十天理命億兆定中元於玄機制隂陽以齊首拔真擢領封河召海斷任死生把執天滅馘滅六天總罰三官罰執北帝明公侍軒道亦髙標德弘逸逺任亦重矣掌亦侔也哉既已説之以智慧又復記之以消魔智慧可以驅神消魔可以滅邪復授之以神虎真符使威馘六天詠之以揮神髙章亦助之散穢去患也且太微帝君所寶有金虎真符以制天地神靈叱之以行便得摧斬千精佩之而往則萬鬼滅形衆魔妄侵而即死群妖窺之而自冥乃可俱授山淵以成其任乎於是太微帝君唯唯稽首乃解雲笈發瓊函七光映素流日啓真九暉停曜飛香交纒執符未授顧命太微侍女紀林華嚴採雲朱條煙韓放要等合歌金真之詩步虛之曲其辭曰太冥絶四玄洞景寄神通玉臺敷朱霄緑霞有金墉上挹雲珠領仰授無刃峰靈鏡耀紫館藹朱暉中空冥化纒玄根把節攜紫童圎塗無凝漠綺藹復有重南排朱阜戶西踰豪缺窗體矯萬津波神生攝十方玄歸反寂轅上嚮乘天龍冥攄飛景輿揮鈴七道遊輕浪雲塵津歘巳造玉州左攝玉映妻右命金真夫上接飛霄賢俯援靈妙疇彌纒廣寒宇披錦入神丘鳯腦固劫齡蘂醴反華頽太上實夀稔制命萬杪階三覺承玄數縱歡煥牙回飊粲渟浪華紫桂何棲棲琳實鳴九霄玉節徴太微黃策遏德刃豈干真人暉棄素入無質百象始俱遺豁陽丹氣穎爛粲絳雲飛齊契玉映靜炫懸上清畿神靈應冥數順感招兆世洪津浪紛蔚併景參容裔巍峩金闕子蕭條入靈際俯仰萬兆變將順同精契玄栖絶寂臺清詠智與慧消魔滅萬鋒揮詩以逐穢金虎承天威摧神以匿氣掃妖千萬傾萬里旡邪芥於焉大神割血百精喪目金虎奮豪吐威放毒投鬼無間橫截刳腹六天共首神靈頓局鳥獸藏音林草偃伏太元竒逸靈文玄郁佩之而進得以朝玉皇禮之於寢衆真詣其房有泄於神虎文禍遘於九宗有漏於金虎真符災逮於七祖山淵藏之道德之英矣夜中恐畏但諷此二篇詩則千精迸匿如與萬人同宿山川聞此詠皆執鞭向聲處而拜敬也其後一篇詩九華安妃書出十一月六日五鼓向曉紫清九華安妃來授此令書未旦畢在太上八術智慧滅魔神虎隱文卷中洞真太上神虎隱文
